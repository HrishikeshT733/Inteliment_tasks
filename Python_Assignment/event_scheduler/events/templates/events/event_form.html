{% extends 'events/base.html' %}

{% block content %}
<div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 500px;">
    <h2 style="margin-bottom: 24px;">{{ title }}</h2>

    <form method="post">
        {% csrf_token %}

        {% if form.non_field_errors %}
            <div style="background: #f8d7da; color: #721c24; padding: 10px 14px; border-radius: 4px; margin-bottom: 16px; border: 1px solid #f5c6cb;">
                {{ form.non_field_errors }}
            </div>
        {% endif %}

        {% for field in form %}
        <div style="margin-bottom: 16px;">
            <label style="display: block; font-weight: bold; margin-bottom: 4px;">{{ field.label }}</label>
            {{ field }}
            {% if field.errors %}
                <p style="color: #e74c3c; font-size: 13px; margin-top: 4px;">{{ field.errors|join:", " }}</p>
            {% endif %}
        </div>
        {% endfor %}

        <div style="display: flex; gap: 10px; margin-top: 8px;">
            <button type="submit" class="btn btn-primary">Save Event</button>
            <a href="{% url 'event_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>

<style>
    input[type="text"], input[type="date"], input[type="time"], textarea {
        width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px;
        font-family: Arial, sans-serif; font-size: 14px;
    }
    textarea { resize: vertical; }
</style>
{% endblock %}
