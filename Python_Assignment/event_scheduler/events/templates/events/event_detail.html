{% extends 'events/base.html' %}
{% block content %}
<h2>{{ event.name }}</h2>
<p><strong>Date:</strong> {{ event.date }}</p>
<p><strong>Time:</strong> {{ event.time }}</p>
<p><strong>Description:</strong><br>{{ event.description|default:"No description provided." }}</p>
<p><small>Created: {{ event.created_at }} | Updated: {{ event.updated_at }}</small></p>
<div class="actions">
    <a href="{% url 'event_update' event.pk %}" class="btn btn-warning">Edit</a>
    <a href="{% url 'event_delete' event.pk %}" class="btn btn-danger">Delete</a>
    <a href="{% url 'event_list' %}" class="btn btn-secondary">Back to List</a>
</div>
{% endblock %}
