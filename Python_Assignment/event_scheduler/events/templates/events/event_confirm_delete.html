{% extends 'events/base.html' %}

{% block content %}
<div style="background: white; padding: 30px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); max-width: 480px;">
    <h2 style="margin-bottom: 16px;">Delete Event</h2>
    <p style="margin-bottom: 8px;">Are you sure you want to delete this event?</p>
    <p style="font-weight: bold; margin-bottom: 24px; color: #2c3e50;">{{ event.name }} on {{ event.date }} at {{ event.time }}</p>
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 10px;">
            <button type="submit" class="btn btn-danger">Yes, Delete</button>
            <a href="{% url 'event_list' %}" class="btn btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
