{% extends 'events/base.html' %}
{% block content %}
<h2>Create Account</h2>
<form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit" class="btn btn-primary" style="margin-top:10px;">Register</button>
</form>
<p style="margin-top:15px;">Already have an account? <a href="{% url 'login' %}">Login here</a></p>
{% endblock %}
